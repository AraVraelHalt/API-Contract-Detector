version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: contracts
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    entrypoint: ["/docker/init.sh", "docker-entrypoint.sh"]

volumes:
  db_data:
